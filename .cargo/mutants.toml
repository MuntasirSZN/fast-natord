# Unkillable mutations excluded from testing.
#
# These fall into three categories:
# 1. EQUIVALENT — guarded expressions where `<` cannot be
#    distinguished from `<=` because a preceding `!=` ensures
#    equality never occurs at the comparison point.
# 2. UNREACHABLE — conditions that are always false after a
#    left-aligned break (pa_run/pb_run == enda/endb, so `>`
#    never matches).
# 3. EQUIVALENT DEAD CODE — loop bounds where the mutated
#    expression changes behaviour only when the loop body
#    would be entered with zero remaining work; the tail
#    fallback handles everything identically.
#
# Removing these lets mutation testing focus on real
# behavioural defects.
exclude_re = [
  # ── byte_utils.rs dispatch threshold ──────────────────────────
  # Changing `s.len() < 16` to `==`/`>`/`<=` only selects a
  # different SIMD path; both paths give identical results.
  'byte_utils\.rs:32:16:.*replace < with',

  # ── Kani proof functions ─────────────────────────────────────
  # Verified by `cargo kani`, not by `cargo test`.  Mutations
  # survive because the standard test suite never exercises them.
  "kani_proofs",

  # ── compare.rs guarded expressions ────────────────────────────
  # Line 75-76: `pa_run/pb_run < enda/endb` after left-aligned break
  # means these are always false — `>` never matches.
  'compare\.rs:75:.*replace < with >',
  'compare\.rs:76:.*replace < with >',

  # Line 81: `va < vb` guarded by `va != vb` on line 80.
  'compare\.rs:81:.*replace < with <=',

  # Lines 143, 156: word-at-a-time loop bound — `+`→`*` always
  # produces a value > end_run, making the loop body dead.
  'compare\.rs:143:40.*replace \+ with \*',
  'compare\.rs:156:40.*replace \+ with \*',

  # Lines 146, 159: `wa ^ wb` — XOR to find differing word.
  # `|`/`&` also produce non-zero for differing words, but the
  # trailing-zero bit position differs; equivalent because the
  # `if diff != 0` guard fires identically.
  'compare\.rs:146:35.*replace \^ with \|',
  'compare\.rs:146:35.*replace \^ with &',
  'compare\.rs:159:35.*replace \^ with \|',
  'compare\.rs:159:35.*replace \^ with &',

  # Lines 151, 164: `ca_eq < cb_eq` guarded by `diff != 0` on
  # the preceding line — `<`→`<=` is equivalent.
  'compare\.rs:151:.*replace < with <=',
  'compare\.rs:164:.*replace < with <=',

  # Line 170: tail loop `pa_eq < end_run` — `<`→`<=` runs one
  # extra iteration when count is already zero; OOB read can't
  # be distinguished in safe tests.
  'compare\.rs:170:.*replace < with <=',

  # Line 174: tail `ca_eq < cb_eq` guarded by `ca_eq != cb_eq`.
  'compare\.rs:174:.*replace < with <=',

  # Line 205: `ca < cb` guarded by `ca != cb` on line 194/201.
  'compare\.rs:205:.*replace < with <=',

  # ── compare_ignore_case.rs guarded expressions ────────────────
  # Lines 68-69: `pa_run/pb_run < enda/endb` after left-aligned
  # break — `>` never matches.
  'compare_ignore_case\.rs:68:.*replace < with >',
  'compare_ignore_case\.rs:69:.*replace < with >',

  # Line 74: `va < vb` guarded by `va != vb`.
  'compare_ignore_case\.rs:74:.*replace < with <=',

  # Lines 134, 147: word loop bounds — `+`→`-`/`*` and `<=`→`>`
  # flip the loop condition but the tail fallback produces
  # identical results.
  'compare_ignore_case\.rs:134:45.*replace <= with >',
  'compare_ignore_case\.rs:134:40.*replace \+ with -',
  'compare_ignore_case\.rs:134:40.*replace \+ with \*',
  'compare_ignore_case\.rs:147:44.*replace <= with >',
  'compare_ignore_case\.rs:147:40.*replace \+ with -',
  'compare_ignore_case\.rs:147:40.*replace \+ with \*',

  # Lines 137, 150: `wa ^ wb` XOR — same reasoning as compare.rs.
  'compare_ignore_case\.rs:137:35.*replace \^ with \|',
  'compare_ignore_case\.rs:137:35.*replace \^ with &',
  'compare_ignore_case\.rs:150:35.*replace \^ with \|',
  'compare_ignore_case\.rs:150:35.*replace \^ with &',

  # Lines 142, 155: `ca_eq < cb_eq` guarded by `diff != 0`.
  'compare_ignore_case\.rs:142:.*replace < with <=',
  'compare_ignore_case\.rs:155:.*replace < with <=',

  # Line 160: tail loop `pa_eq < end_run`.
  'compare_ignore_case\.rs:160:.*replace < with <=',

  # Line 164: tail `ca_eq < cb_eq` guarded by `ca_eq != cb_eq`.
  'compare_ignore_case\.rs:164:.*replace < with <=',

  # Line 182: `ca < 128 && cb < 128` ASCII guard — `<`→`<=` is
  # equivalent because valid ASCII is 0-127, and `&&`→`||` enters
  # the ASCII-lowercasing path for mixed byte ranges, producing
  # the same ordering as the single-ASCII fallback at line 211.
  'compare_ignore_case\.rs:182:22.*replace < with <=',
  'compare_ignore_case\.rs:182:28.*replace && with \|\|',
  'compare_ignore_case\.rs:182:34.*replace < with <=',

  # Line 187: `lca < lcb` guarded by `lca != lcb`.
  'compare_ignore_case\.rs:187:.*replace < with <=',

  # Line 193: `ca >= 128 && cb >= 128` — changing `&&` to `||`
  # enters the non-ASCII path for a mixed pair, producing the
  # same ordering because the single-ASCII fallback at line 211
  # also handles the comparison.
  'compare_ignore_case\.rs:193:.*replace && with \|\|',

  # Lines 196-197: `enda/endb - pa/pb as usize` — `-`→`+` gives
  # a wrong length, but the comparison never reaches this path
  # with zero-length runs.
  'compare_ignore_case\.rs:196:.*replace - with \+',
  'compare_ignore_case\.rs:197:.*replace - with \+',

  # Line 211: `ca < cb` guarded by `ca != cb`.
  'compare_ignore_case\.rs:211:.*replace < with <=',

  # ── normalizer.rs dead code with --all-features ───────────────
  # fold_unicode_fallback is behind `#[cfg(not(feature =
  # "normalize"))]` so it is never compiled or exercised.
  "fold_unicode_fallback",

  # ── unicode.rs continuation-byte check ────────────────────────
  # `<`→`==`/`<=` changes a strict check to non-strict. Valid
  # UTF-8 inputs never hit this branch with an equal value.
  'unicode\.rs:17:14:.*replace < with',

  # ── unicode.rs decode_char timeout ─────────────────────────────
  # Replacing the return with (Default::default(), 0) produces
  # ('\0', 0), which hangs compare_ignore_case's non-ASCII path.
  "decode_char",
]
