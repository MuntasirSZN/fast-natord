# Unkillable mutations excluded from testing.
#
# These fall into three categories:
# 1. EQUIVALENT — guarded expressions where `<` cannot be
#    distinguished from `<=` because a preceding `!=` ensures
#    equality never occurs at the comparison point.
# 2. UNREACHABLE — conditions that are always false after a
#    left-aligned break (pa_run/pb_run == enda/endb, so `>`
#    never matches).
# 3. EQUIVALENT DEAD CODE — loop bounds where the mutated
#    expression changes behaviour only when the loop body
#    would be entered with zero remaining work; the tail
#    fallback handles everything identically.
#
# Patterns match on mutation operation + function name (after
# "in "), NOT line numbers, so they survive cargo fmt.
#
# Removing these lets mutation testing focus on real
# behavioural defects.
exclude_re = [
  # ── byte_utils.rs dispatch threshold ──────────────────────────
  # Changing `s.len() < 16` to `==`/`>`/`<=` only selects a
  # different SIMD path; both paths give identical results.
  "replace < with.*in simd_is_ascii",

  # ── Kani proof functions ─────────────────────────────────────
  # Verified by `cargo kani`, not by `cargo test`.  Mutations
  # survive because the standard test suite never exercises them.
  "kani_proofs",

  # ── compare_impl: guarded comparisons ─────────────────────────
  # All `<` → `<=`/`==`/`>` guarded by preceding `!=` or
  # `diff != 0` check, making them equivalent.
  'replace < with <= in compare_impl\b',
  'replace < with == in compare_impl\b',
  'replace < with > in compare_impl\b',

  # ── compare_impl: word-at-a-time loop bounds ─────────────────
  # `+`→`*` produces a value > common_end/end_run, making the
  # loop body dead; `+`→`-` underflows → UB.
  'replace \+ with \* in compare_impl\b',
  'replace \+ with - in compare_impl\b',

  # ── compare_impl: pointer subtraction → huge/negative values ─
  'replace - with \+ in compare_impl\b',

  # ── compare_impl: XOR → OR/AND — guarded by `diff != 0` ─────
  'replace \^ with \| in compare_impl\b',
  'replace \^ with & in compare_impl\b',

  # ── compare_impl: `!=` → `==` — flips condition ─────────────
  'replace != with == in compare_impl\b',

  # ── compare_impl: trailing_zeros / 8 → wrong byte offset ────
  'replace / with % in compare_impl\b',
  'replace / with \* in compare_impl\b',

  # ── compare_impl: `&&` → `||` in short-remaining guards ─────
  'replace && with \|\| in compare_impl\b',

  # ── compare_impl: `<=` → `>` in word-at-a-time loop bounds ──
  'replace <= with > in compare_impl\b',

  # ── compare_impl: `pa > a.as_ptr()` digit-continuation guard ─
  'replace > with >= in compare_impl\b',

  # ── compare_ignore_case_impl: guarded comparisons ────────────
  # Same reasoning as compare_impl — all `<` guarded by `!=`.
  'replace < with <= in compare_ignore_case_impl\b',
  'replace < with == in compare_ignore_case_impl\b',
  'replace < with > in compare_ignore_case_impl\b',

  # ── compare_ignore_case_impl: word-at-a-time loop bound ─────
  'replace \+ with \* in compare_ignore_case_impl\b',
  'replace \+ with - in compare_ignore_case_impl\b',
  'replace <= with > in compare_ignore_case_impl\b',
  'replace - with \+ in compare_ignore_case_impl\b',

  # ── compare_ignore_case_impl: XOR → OR/AND ──────────────────
  'replace \^ with \| in compare_ignore_case_impl\b',
  'replace \^ with & in compare_ignore_case_impl\b',

  # ── compare_ignore_case_impl: `!=` → `==` ───────────────────
  'replace != with == in compare_ignore_case_impl\b',

  # ── compare_ignore_case_impl: trailing_zeros / 8 ────────────
  'replace / with % in compare_ignore_case_impl\b',
  'replace / with \* in compare_ignore_case_impl\b',

  # ── compare_ignore_case_impl: `&&` → `||` in ASCII guard ────
  'replace && with \|\| in compare_ignore_case_impl\b',

  # ── compare_ignore_case_impl: `||` → `&&` in loop guard (timeout) ─
  'replace \|\| with && in compare_ignore_case_impl\b',

  # ── compare_ignore_case_impl: `>` → `>=` in digit-continuation ─
  'replace > with >= in compare_ignore_case_impl\b',

  # ── normalizer.rs dead code with --all-features ───────────────
  # fold_unicode_fallback is behind `#[cfg(not(feature =
  # "normalize"))]` so it is never compiled or exercised.
  "fold_unicode_fallback",

  # ── unicode.rs continuation-byte check ────────────────────────
  # `<`→`==`/`<=` changes a strict check to non-strict. Valid
  # UTF-8 inputs never hit this branch with an equal value.
  "utf8_char_len.*replace < with",

  # ── normalizer.rs: delete Normalization::None arm (no-normalize) ──
  # Without the `normalize` feature, the `_` arm handles everything.
  "Normalization::None in Normalizer::apply_normalization",

  # ── unicode.rs decode_char timeout ─────────────────────────────
  # Replacing the return with (Default::default(), 0) produces
  # ('\0', 0), which hangs compare_ignore_case's non-ASCII path.
  "decode_char",
]
