[package]
name = "fast-natord"
version = "0.1.0"
edition = "2024"
rust-version = "1.91"
description = "Natural ordering for Rust"
readme = "README.md"
homepage = "https://github.com/MuntasirSZN/fast-natord"
repository = "https://github.com/MuntasirSZN/fast-natord"
license = "MIT"
keywords = ["natural", "order", "sort"]

[[bench]]
harness = false
name = "natord"

[features]
default = []
normalize = ["dep:simd-normalizer"]

[dependencies]
cpufeatures = "0.3.0"
simd-normalizer = { version = "0.1", optional = true, default-features = false, features = ["alloc"] }

[dev-dependencies]
divan = "0.1.21"
