[package]
name = "fast-natord"
version = "0.1.0"
edition = "2024"
rust-version = "1.88"
description = "Natural ordering for Rust"
readme = "README.md"
homepage = "https://github.com/MuntasirSZN/fast-natord"
repository = "https://github.com/MuntasirSZN/fast-natord"
license = "MIT"
keywords = ["natural", "order", "sort"]

[[bench]]
harness = false
name = "natord"

[dependencies]
cpufeatures = "0.3.0"
icu_collator = {
  version = "2.2",
  default-features = false,
  features = ["compiled_data"],
  optional = true
}
icu_locale = {
  version = "2.2",
  default-features = false,
  features = ["compiled_data"],
  optional = true
}
sys-locale = { version = "0.3", optional = true }
thiserror = { version = "2", default-features = false }

[dev-dependencies]
divan = "0.1.21"

[features]
locale = ["dep:icu_collator", "dep:icu_locale", "dep:sys-locale"]
