name: Setup Windows
description: Enable Git long paths, Windows long paths, and cargo CLI git fetch

runs:
  using: composite
  steps:
    - name: Enable Git long paths
      shell: bash
      run: git config --system core.longpaths true

    - name: Enable Windows long paths
      shell: powershell
      run: |
        New-ItemProperty `
          -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
          -Name LongPathsEnabled `
          -Value 1 `
          -PropertyType DWORD `
          -Force

    - name: Configure cargo to use CLI git fetch
      shell: bash
      run: |
        mkdir -p "$HOME/.cargo"
        cfg="$HOME/.cargo/config.toml"
        if [ -f "$cfg" ] && grep -q 'git-fetch-with-cli' "$cfg"; then
          : # already present
        else
          printf '\n[net]\ngit-fetch-with-cli = true\n' >> "$cfg"
        fi
